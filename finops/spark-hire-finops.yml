meters:
- name: product_subscription
  description: Fixed subscription per bundled product (Video Interviews, Behavioral Assessment, Recruit ATS), scaled by company-size band.
  unit: subscription
  aggregation: sum
  dimensions:
  - product
  - company_size_band
- name: api_requests
  description: API requests against the 400/minute rate limit. Not separately billed; tracked for operational cost/scaling only.
  unit: requests
  aggregation: sum
  dimensions:
  - api_key
- name: interviews
  description: Interviews created, as an operational usage signal (not a separate line item).
  unit: interviews
  aggregation: sum
  dimensions:
  - job
  - user
principles:
- name: Visibility
  description: Track which products (Video Interviews, Assessment, Recruit ATS) and company-size band drive the subscription, and monitor interview volume against plan expectations.
- name: Allocation
  description: Map the Spark Hire subscription to the hiring/recruiting cost center; attribute seats and jobs to teams.
- name: Optimization
  description: Right-size the product bundle and company-size band; use webhooks instead of polling to stay within the API rate limit and avoid over-engineering integrations.
- name: Accountability
  description: Assign an owner for the Spark Hire contract; review the bundle and band at annual renewal against actual hiring volume.
