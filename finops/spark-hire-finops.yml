description: >-
  FinOps view of Spark Hire spend. Spark Hire is billed as a SaaS subscription
  scaled by company size and the products you bundle (Video Interviews,
  Behavioral Assessment, Recruit ATS), typically on annual terms, with an
  Enterprise tier for larger organizations. The REST API is an integration
  capability of a paid account rather than a separately metered, usage-billed
  product - there is no public per-call API charge - so API cost is effectively a
  fixed component of the subscription. The dominant cost drivers are the chosen
  product bundle and company-size band, not API call volume.
notes: >-
  Per-unit and per-tier rates are not officially reconciled here; verify with a
  Spark Hire quote and https://www.sparkhire.com/pricing/. Because billing is
  subscription-based, FinOps attention should focus on right-sizing the product
  bundle and seat/company-size band and on consolidating hiring tooling, rather
  than on metering API usage.
