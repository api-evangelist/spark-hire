aid: spark-hire
name: Spark Hire
review:
  question: Does Spark Hire expose a documented public WebSocket API?
  answer: false
  date: '2026-07-10'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Spark Hire's public API is
    request/response REST over HTTPS under https://api.sparkhire.com/v1.0.
    Its only server-push mechanism is outbound HTTP webhooks - Spark Hire
    POSTs a changed object to a URL you register for a subscribed event.
    That is server-to-endpoint HTTP, not a WebSocket or SSE stream on Spark
    Hire's own API, so there is no AsyncAPI channel to model here. (Webhooks
    could be modeled as an AsyncAPI application in a later pass, but no
    persistent bidirectional or SSE transport exists.)
findings:
  summary: |
    Spark Hire does not publish a documented public WebSocket API. Spark Hire
    is a video interviewing and talent assessment platform. Its API is a
    RESTful JSON API served under https://api.sparkhire.com/v1.0, authenticated
    with HTTP Basic where the username is a per-user API key and the password
    is ignored. All documented endpoints use GET, POST, PUT, or DELETE over
    HTTPS. Instead of a realtime socket, Spark Hire offers outbound webhooks:
    you register a URL and Spark Hire POSTs the changed interview or job object
    to it when a subscribed event fires. No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    the Spark Hire API reference as of the review date.
  accessModel: |
    The API reference at https://docs.sparkhire.com/ is fully public, but API
    access is NOT self-serve - it must be enabled on your Spark Hire account by
    Spark Hire before keys will work. Endpoint paths and behavior in this
    catalog are transcribed from that public reference; request/response
    schemas in the OpenAPI are honestly modeled from the documented resources
    and were not exercised live (access-gated).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.sparkhire.com/v1.0
      documented: true
      note: JSON request/response. HTTP Basic auth (username = API key, password ignored).
    - protocol: Webhook
      scheme: https
      documented: true
      note: Spark Hire POSTs changed objects to a registered URL on subscribed events. Outbound HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the Spark Hire API reference as of the review date.
